<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111418;
    --border: #1e2330;
    --text: #e8eaf0;
    --muted: #5a6175;
    --tooltip-bg: #181c24;
    --openai: #10b981;
    --anthropic: #f59e0b;
    --google: #3b82f6;
    --xai: #a855f7;
    --meta: #ef4444;
    --deepseek: #06b6d4;
    --timeline-h: 2px;
    --row-gap: 72px;
    --dot-size: 10px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: #d8d5ce;
      --text: #1a1a1a;
      --muted: #8a8780;
      --tooltip-bg: #ffffff;
      --openai: #0a8a60;
      --anthropic: #c47d00;
      --google: #1a5fbf;
      --xai: #7c3aed;
      --meta: #c0392b;
      --deepseek: #0891b2;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ──────────────────────────────────────────── */
  header {
    padding: 48px 60px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 24px;
  }

  .header-left h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .header-left h1 em {
    font-style: italic;
    color: var(--muted);
  }

  .header-left p {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── SHADE KEY ───────────────────────────────────────── */
  .shade-key {
    padding: 12px 24px;
    display: flex;
    gap: 20px;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .shade-key-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .shade-swatch {
    width: 22px; height: 10px;
    border-radius: 3px;
    background: var(--text);
    display: inline-block;
    flex-shrink: 0;
  }
  .shade-swatch--low  { opacity: 0.12; }
  .shade-swatch--mid  { opacity: 0.25; }
  .shade-swatch--high { opacity: 0.50; }

  /* ── TIMELINE OUTER LAYOUT ───────────────────────────── */
  .timeline-outer {
    display: flex;
    align-items: flex-start;
    padding-left: 16px;
  }

  /* ── STICKY LABEL RAIL ───────────────────────────────── */
  .label-rail {
    flex-shrink: 0;
    width: 72px;
    position: sticky;
    left: 16px;
    z-index: 20;
    background: var(--bg);
    pointer-events: none;
  }

  .label-rail-item {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
  }

  .label-rail-item span {
    font-size: 0.64rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  /* ── CANVAS WRAPPER ──────────────────────────────────── */
  .canvas-wrap {
    overflow-x: auto;
    overflow-y: visible;
    padding: 0 60px 60px 0;
    flex: 1;
    min-width: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }
  .canvas-wrap::-webkit-scrollbar { height: 6px; }
  .canvas-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── TIMELINE SVG STAGE ───────────────────────────────── */
  .timeline-stage {
    position: relative;
    /* width set by JS */
    min-height: 540px;
  }

  /* ── YEAR RULER ──────────────────────────────────────── */
  .year-ruler {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    height: var(--timeline-h);
    background: var(--border);
  }

  .year-mark {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .year-mark-line {
    width: 1px;
    height: 12px;
    background: var(--border);
  }

  .year-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    white-space: nowrap;
    margin-top: 10px;
  }

  /* ── ROWS ─────────────────────────────────────────────── */
  .rows-area {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    bottom: 0;
  }

  .org-row {
    position: absolute;
    left: 0;
    right: 0;
    height: var(--row-gap);
    transition: opacity 0.2s;
  }

  /* ── CAPABILITY BANDS ────────────────────────────────── */
  .cap-band {
    position: absolute;
    top: 6px;
    bottom: 6px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.3s;
  }

  .org-label {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.64rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    width: 60px;
    text-align: right;
    padding-right: 10px;
    white-space: nowrap;
    pointer-events: none;
  }

  .row-line {
    position: absolute;
    top: 50%;
    height: 1px;
    background: var(--border);
    left: 0;
    right: 0;
    transform: translateY(-50%);
    opacity: 0.4;
  }

  /* ── EVENTS ──────────────────────────────────────────── */
  .event {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.2s;
  }

  .event-dot {
    width: var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    border: 2px solid;
    background: var(--bg);
    position: relative;
    z-index: 2;
    transition: transform 0.15s, box-shadow 0.15s;
    margin: 0 auto;
  }

  .event:hover .event-dot {
    transform: scale(1.6);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.06);
  }

  .event-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.15s;
  }

  .event-label.above { bottom: calc(100% + 4px); }
  .event-label.below { top: calc(100% + 4px); }

  .event:hover .event-label { color: var(--text); }

  /* ── TOOLTIP ─────────────────────────────────────────── */
  #tooltip {
    position: fixed;
    z-index: 1000;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
  }

  #tooltip.visible { opacity: 1; }

  .tooltip-inner {
    background: var(--tooltip-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  }

  .tooltip-org {
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .tooltip-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.1rem;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .tooltip-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .tooltip-desc {
    font-size: 0.72rem;
    color: #8a93a8;
    line-height: 1.5;
    font-weight: 300;
  }

  .event-landmark svg {
    transition: transform 0.15s, filter 0.15s;
  }
  .event-landmark:hover svg {
    transform: scale(1.5);
  }

  .tooltip-landmark {
    margin-top: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fbbf24;
  }

  
    margin-top: 8px;
    padding: 6px 8px;
    background: rgba(239,68,68,0.08);
    border-left: 2px solid #ef4444;
    border-radius: 0 4px 4px 0;
    font-size: 0.65rem;
    color: #f87171;
    line-height: 1.4;
  }

  /* ── SCROLL HINT ─────────────────────────────────────── */
  .scroll-hint {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 64px;
    background: linear-gradient(to right, transparent, var(--bg));
    pointer-events: none;
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    transition: opacity 0.4s;
  }

  .scroll-hint-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--muted);
    font-size: 0.58rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
    animation: nudge 2s ease-in-out infinite;
  }

  .scroll-hint-arrow {
    font-size: 1rem;
    line-height: 1;
  }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50%       { transform: translateX(4px); }
  }

  .scroll-hint.hidden { opacity: 0; pointer-events: none; }

</style>
</head>

<header>
  <div class="header-left">
    <h1>The LLM Race <em>— A Visual History</em></h1>
    <p>Jun 2017 – Mar 2026 · Every major model release</p>
  </div>
</header>

<div class="shade-key">
  <div class="shade-key-item"><span class="shade-swatch shade-swatch--low"></span>Base model</div>

  </div>

  </div>
</div>

  <div class="tooltip-name" id="tt-name"></div>

  <div class="tooltip-desc" id="tt-desc"></div>

  { org:'deepseek', era:2, date:'2025-08', name:'DeepSeek V3.1',  short:'V3.1',    desc:'Released August 2025. Hybrid model: can toggle between thinking and non-thinking mode. Optimized for domestic AI accelerators.' },
  { org:'deepseek', era:2, date:'2025-09', name:'DeepSeek V3.2',  short:'V3.2',    desc:'Released September 29, 2025. Introduced DeepSeek Sparse Attention for greater efficiency. Gold-medal performance on IMO, CMO, ICPC, and IOI 2025.' },

// ── LAYOUT CONSTANTS ─────────────────────────────────────────────────
const PX_PER_MONTH = 80;
const LEFT_PAD = 16;
const TOP_PAD = 36;
const ROW_H = 72;

function dateToMs(str) {
  const parts = str.split('-');
  const y = parseInt(parts[0]);
  const m = parts[1] ? parseInt(parts[1]) : 1;
  const d = parts[2] ? parseInt(parts[2]) : 1;
  return new Date(y, m-1, d).getTime();
}

const eras = [
  { label:'Pre-ChatGPT', start:'2017-06', end:'2022-11' },
  { label:'Chatbot Era',  start:'2022-11', end:'2024-09' },
  { label:'Reasoning Era',start:'2024-09', end:'2026-03' },
];

function getEraRange(eraIdx) {
  if (eraIdx === 'all') return { start: eras[0].start, end: eras[2].end };
  return eras[eraIdx];
}

// ── STAR PATH HELPER ──────────────────────────────────────────────────
// Returns an SVG <polygon> points string for a 5-point star centred at (cx,cy)
function starPoints(cx, cy, outerR, innerR) {
  const pts = [];
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (Math.PI / 5) * i - Math.PI / 2;
    pts.push((cx + r * Math.cos(angle)).toFixed(2) + ',' + (cy + r * Math.sin(angle)).toFixed(2));
  }
  return pts.join(' ');
}

// ── STATE ────────────────────────────────────────────────────────────
const currentEra = 'all';

// ── RENDER ───────────────────────────────────────────────────────────
function render() {
  const stage = document.getElementById('stage');
  stage.innerHTML = '';

  // ── LABEL RAIL ──────────────────────────────────────────────────────
  const rail = document.getElementById('labelRail');
  rail.innerHTML = '';


  const eraRange = getEraRange(currentEra);
  const startMs = dateToMs(eraRange.start);
  const endMs   = dateToMs(eraRange.end);
  const totalW  = Math.ceil((endMs - startMs) / (1000*60*60*24*30.44) * PX_PER_MONTH) + LEFT_PAD + 40;

  stage.style.width    = totalW + 'px';
  const stageH = TOP_PAD + (ORGS.length + 1) * ROW_H;
  stage.style.minHeight = stageH + 'px';
  rail.style.height = stageH + 'px';

  function xFor(dateStr) {
    const ms = dateToMs(dateStr);
    return LEFT_PAD + (ms - startMs) / (endMs - startMs) * (totalW - LEFT_PAD - 40);
  }

  // Year ruler
  const ruler = document.createElement('div');
  ruler.className = 'year-ruler';
  ruler.style.top = (TOP_PAD + ROW_H / 2) + 'px';
  stage.appendChild(ruler);

  // Year marks
  const startYear = new Date(startMs).getFullYear();
  const endYear   = new Date(endMs).getFullYear() + 1;
  for (let y = startYear; y <= endYear; y++) {
    for (let m = 0; m < 12; m += 6) {
      const d  = `${y}-${String(m+1).padStart(2,'0')}`;
      const ms = dateToMs(d);
      if (ms < startMs || ms > endMs) continue;
      const x    = xFor(d);
      const mark = document.createElement('div');
      mark.className = 'year-mark';
      mark.style.left = x + 'px';
      mark.style.top  = (TOP_PAD + ROW_H / 2) + 'px';
      mark.innerHTML  = `<div class="year-mark-line"></div><div class="year-label">${m === 0 ? y : ''}</div>`;
      stage.appendChild(mark);
    }
  }

  // Rows + events — always show all orgs
  ORGS.forEach((org, rowIdx) => {
    const rowY = TOP_PAD + ROW_H + rowIdx * ROW_H;

    const orgRow = document.createElement('div');
    orgRow.className = 'org-row';
    orgRow.style.top = rowY + 'px';
    orgRow.dataset.org = org;

    // Add label to sticky rail
    const railItem = document.createElement('div');
    railItem.className = 'label-rail-item';
    railItem.dataset.org = org;
    railItem.style.top    = rowY + 'px';
    railItem.style.height = ROW_H + 'px';
    const railSpan = document.createElement('span');
    railSpan.style.color = ORG_COLORS[org];
    railSpan.textContent = ORG_LABELS[org];
    railItem.appendChild(railSpan);
    rail.appendChild(railItem);

    const line = document.createElement('div');
    line.className = 'row-line';
    orgRow.appendChild(line);

    stage.appendChild(orgRow);

    // ── CAPABILITY BANDS ─────────────────────────────────────────────
    const eraToLevel = { '-1': 0, 0: 1, 1: 2, 2: 3 };
    const levelOpacity = { 1: 0.10, 2: 0.20, 3: 0.34 };

    const allOrgEvents = EVENTS
      .filter(e => e.org === org)
      .sort((a, b) => dateToMs(a.date) - dateToMs(b.date));

    const transitions = [];
    let maxLevel = 0;
    allOrgEvents.forEach(ev => {
      const lvl = eraToLevel[ev.era] ?? 1;
      if (lvl > maxLevel) {
        maxLevel = lvl;
        transitions.push({ ms: dateToMs(ev.date), level: maxLevel });
      }
    });

    transitions.forEach((tr, ti) => {
      const bandStart = Math.max(tr.ms, startMs);
      const bandEnd   = ti + 1 < transitions.length ? Math.min(transitions[ti+1].ms, endMs) : endMs;
      if (bandEnd <= bandStart) return;
      const x1 = LEFT_PAD + (bandStart - startMs) / (endMs - startMs) * (totalW - LEFT_PAD - 40);
      const x2 = LEFT_PAD + (bandEnd   - startMs) / (endMs - startMs) * (totalW - LEFT_PAD - 40);
      const band = document.createElement('div');
      band.className = 'cap-band';
      band.style.left       = x1 + 'px';
      band.style.width      = (x2 - x1) + 'px';
      band.style.background = ORG_COLORS[org];
      band.style.opacity    = levelOpacity[tr.level];
      orgRow.appendChild(band);
    });

    // ── EVENTS ───────────────────────────────────────────────────────
    const orgEvents = EVENTS.filter(e => {
      if (e.org !== org) return false;
      const ms = dateToMs(e.date);
      return ms >= startMs && ms <= endMs;
    });

    const placed = [];
    orgEvents.forEach((ev, i) => {
      const x  = xFor(ev.date);
      const el = document.createElement('div');
      el.className = 'event';
      el.style.left = x + 'px';
      el.style.top  = '50%';

      const tooClose = placed.some(px => Math.abs(px - x) < 55);
      const above    = i % 2 === 0 && !tooClose;
      placed.push(x);

      const color = ORG_COLORS[org];

      if (ev.landmark) {
        // ── Star marker ──
        const SIZE = 20;
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width',  SIZE);
        svg.setAttribute('height', SIZE);
        svg.setAttribute('viewBox', `0 0 ${SIZE} ${SIZE}`);
        svg.style.display  = 'block';
        svg.style.margin   = '0 auto';
        svg.style.overflow = 'visible';
        svg.style.filter   = `drop-shadow(0 0 4px ${color}55)`;
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        poly.setAttribute('points', starPoints(SIZE/2, SIZE/2, SIZE/2 - 1, (SIZE/2 - 1) * 0.42));
        poly.setAttribute('fill',   color);
        poly.setAttribute('stroke', 'none');
        svg.appendChild(poly);
        el.appendChild(svg);
        el.classList.add('event-landmark');
      } else {
        // ── Circle marker ──
        const dot = document.createElement('div');
        dot.className = 'event-dot';
        dot.style.borderColor = color;
        el.appendChild(dot);
      }

      const lbl2 = document.createElement('div');
      lbl2.className = `event-label ${above ? 'above' : 'below'}`;
      lbl2.textContent = ev.short;
      el.appendChild(lbl2);

      el.addEventListener('mouseenter', showTooltip.bind(null, ev, color));
      el.addEventListener('mouseleave', hideTooltip);
      orgRow.appendChild(el);
    });
  });
}

// ── TOOLTIP ──────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(ev, color, e) {
  document.getElementById('tt-org').textContent  = ORG_LABELS[ev.org];
  document.getElementById('tt-org').style.color  = color;
  document.getElementById('tt-name').textContent = ev.name;
  const dateObj = new Date(dateToMs(ev.date));
  const parts   = ev.date.split('-');
  document.getElementById('tt-date').textContent = parts.length === 3
    ? dateObj.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})
    : dateObj.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  document.getElementById('tt-desc').textContent = ev.desc;
  document.getElementById('tt-landmark').style.display = ev.landmark ? '' : 'none';
  document.getElementById('tt-correction').style.display = 'none';
  tooltip.classList.add('visible');
  positionTooltip(e);
}

function hideTooltip() { tooltip.classList.remove('visible'); }

function positionTooltip(e) {
  const tW = 264, tH = 180;
  let left = e.clientX + 16, top = e.clientY + 16;
  if (left + tW > window.innerWidth  - 10) left = e.clientX - tW - 10;
  if (top  + tH > window.innerHeight - 10) top  = e.clientY - tH - 10;
  tooltip.style.left = left + 'px';
  tooltip.style.top  = top  + 'px';
}

document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('visible')) positionTooltip(e);
});

// ── LEGEND TOGGLE removed ───────────────────────────────────────────

// ── DRAG SCROLL ──────────────────────────────────────────────────────
const wrap = document.getElementById('canvasWrap');
let isDragging = false, startX, scrollLeft;
wrap.addEventListener('mousedown', e => { isDragging = true; startX = e.pageX - wrap.offsetLeft; scrollLeft = wrap.scrollLeft; });
wrap.addEventListener('mouseleave', () => isDragging = false);
wrap.addEventListener('mouseup',    () => isDragging = false);
wrap.addEventListener('mousemove',  e => {
  if (!isDragging) return;
  e.preventDefault();
  wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX);
});

// ── SCROLL HINT ──────────────────────────────────────────────────────
const scrollHint = document.getElementById('scrollHint');
const canvasWrapEl = document.getElementById('canvasWrap');
canvasWrapEl.addEventListener('scroll', () => {
  if (canvasWrapEl.scrollLeft > 40) scrollHint.classList.add('hidden');
  else scrollHint.classList.remove('hidden');
}, { passive: true });

// ── INIT ─────────────────────────────────────────────────────────────
render();
</script>
